<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BARNACLES — A Pirate's Compendium</title>
<meta name="description" content="A dark, stormy, interactive companion to the pirate book Barnacles — learn how ships work, sing the shanties, speak the speak, and breathe the salt air." />
<!-- Webfonts load when online; solid serif fallbacks when opened offline -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@500;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Animated weather lives behind everything -->
<canvas id="weather" aria-hidden="true"></canvas>
<div id="vignette" aria-hidden="true"></div>
<div id="lightning" aria-hidden="true"></div>

<!-- "Tap to come aboard" — unlocks audio (browsers require a gesture) -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-mark">&#9760;</div>
    <h1 class="gate-title">BARNACLES</h1>
    <p class="gate-sub">A pirate&rsquo;s compendium &mdash; ships, shanties, speech &amp; salt</p>
    <button id="gate-btn" class="btn-aged">Come Aboard</button>
    <p class="gate-fine">Best with sound. Mind the storm.</p>
  </div>
</div>

<!-- Persistent top rail: brand + quick menu + sound toggle -->
<header id="rail" class="hidden">
  <a class="rail-brand" href="#/hub" title="To the main deck">&#9760; BARNACLES</a>
  <nav id="quicknav" aria-label="Quick navigation"></nav>
  <button id="sound-toggle" class="rail-btn" title="Toggle sound" aria-label="Toggle sound">&#9834;</button>
</header>

<!-- Where rooms render -->
<main id="view" class="hidden"></main>

<footer id="foot" class="hidden">
  <span class="foot-mark">&#9763;</span>
  <a href="https://www.instagram.com/barnacles_book/" target="_blank" rel="noopener">@barnacles_book</a>
  <span class="foot-sep">&middot;</span>
  <span class="foot-quote" id="foot-quote">Only those who survive get to spin the tale.</span>
</footer>

<!-- Scripts are classic (no modules) so the site opens by double-click on file:// -->
<script src="js/content.js"></script>
<script src="js/audio.js"></script>
<script src="js/weather.js"></script>
<script src="js/rooms.js"></script>
<script src="js/app.js"></script>
</body>
</html>
