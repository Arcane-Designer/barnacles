<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>BARNACLES</title>
<meta name="description" content="Move through a pirate ship — learn how she works, sing the shanties, speak the speak, and breathe the salt air." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@500;700&family=IM+Fell+English:ital@0;1&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="css/styles.css" />
</head>
<body>

<!-- Layer stack (back to front) -->
<div id="sky" aria-hidden="true"></div>          <!-- day/night gradient -->
<div id="scene" aria-hidden="true"></div>         <!-- the location's backdrop art -->
<canvas id="weather" aria-hidden="true"></canvas> <!-- rain / motes / bubbles -->
<div id="ambient" aria-hidden="true"></div>       <!-- day/night light tint -->
<div id="lightning" aria-hidden="true"></div>
<div id="vignette" aria-hidden="true"></div>

<!-- Floating, background-less header: wordmark + sound only -->
<a id="brand" href="#/helm" title="Back to the helm">BARNACLES</a>
<button id="sound-toggle" title="Toggle sound" aria-label="Toggle sound">&#9834;</button>

<!-- Interactive layer: exits over the scene + the room's content below -->
<main id="stage" class="hidden">
  <section id="scene-ui"></section>   <!-- exits / "turn around" / location title, over the scene -->
  <section id="content"></section>    <!-- the room's learning content, scroll down to reach -->
</main>

<!-- Movement transitions (doors, ladders, splash) -->
<div id="transition" aria-hidden="true">
  <div class="tr-door tr-door-l"></div>
  <div class="tr-door tr-door-r"></div>
  <div class="tr-wash"></div>
  <div class="tr-label"></div>
</div>

<!-- Tap to come aboard -->
<div id="gate">
  <div class="gate-inner">
    <div class="gate-mark">&#9760;</div>
    <h1 class="gate-title">BARNACLES</h1>
    <p class="gate-sub">Come aboard &mdash; she sails on weather and salt</p>
    <button id="gate-btn" class="btn-aged">Come Aboard</button>
    <p class="gate-fine">Best with sound. Move through her yourself.</p>
  </div>
</div>

<script src="js/content.js"></script>
<script src="js/clock.js"></script>
<script src="js/audio.js"></script>
<script src="js/weather.js"></script>
<script src="js/scenes.js"></script>
<script src="js/rooms.js"></script>
<script src="js/ship.js"></script>
<script src="js/app.js"></script>
</body>
</html>
